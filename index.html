<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業桌球積分賽登記系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .score-btn { transition: all 0.1s; touch-action: manipulation; }
        .score-btn:active:not(:disabled) { transform: scale(0.95); opacity: 0.8; }
        .score-btn:disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(50%); }
        @keyframes pulse-yellow {
            0%, 100% { background-color: #16a34a; }
            50% { background-color: #ca8a04; }
        }
        .animate-confirm { animation: pulse-yellow 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans select-none">

    <div id="setup-modal" class="fixed inset-0 bg-slate-950/90 z-50 flex items-center justify-center p-6">
        <div class="bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-slate-700 shadow-2xl">
            <h2 class="text-2xl font-black text-blue-400 mb-6 text-center">賽前選手設定</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-500 mb-1 ml-1">選手 A (第一局在左側)</label>
                    <input type="text" id="setup-p1" placeholder="輸入姓名..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1 ml-1">選手 B (第一局在右側)</label>
                    <input type="text" id="setup-p2" placeholder="輸入姓名..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-red-500">
                </div>
                <button onclick="startMatch()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg mt-4 transition-all">開始比賽</button>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 flex flex-col min-h-screen">
        <div id="status-bar" class="text-center py-1 bg-slate-800 rounded-full text-[10px] font-bold text-blue-400 mb-4 tracking-widest uppercase">
            Waiting for start...
        </div>

        <div class="bg-slate-800 rounded-2xl p-5 flex justify-between items-center border-b-4 border-blue-500 shadow-2xl mb-6">
            <div class="text-center flex-1">
                <input type="text" id="p1-display" class="bg-transparent text-center text-sm text-gray-400 w-full focus:outline-none" onchange="updateUI()">
                <div id="wins-a" class="text-6xl font-black italic text-white">0</div>
            </div>
            <div class="px-4 text-2xl font-black text-slate-600">VS</div>
            <div class="text-center flex-1">
                <input type="text" id="p2-display" class="bg-transparent text-center text-sm text-gray-400 w-full focus:outline-none" onchange="updateUI()">
                <div id="wins-b" class="text-6xl font-black italic text-white">0</div>
            </div>
        </div>

        <div class="flex gap-4 h-72 mb-6 text-white">
            <button onclick="addPoint('left')" id="btn-left" class="score-btn flex-1 bg-blue-600 rounded-3xl flex flex-col items-center justify-center shadow-[0_8px_0_rgb(30,64,175)]">
                <span id="label-left" class="text-base font-bold mb-2 opacity-80">---</span>
                <span id="score-left" class="text-8xl font-black">0</span>
            </button>
            <button onclick="addPoint('right')" id="btn-right" class="score-btn flex-1 bg-red-600 rounded-3xl flex flex-col items-center justify-center shadow-[0_8px_0_rgb(153,27,27)]">
                <span id="label-right" class="text-base font-bold mb-2 opacity-80">---</span>
                <span id="score-right" class="text-8xl font-black">0</span>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="undo()" class="bg-slate-700 hover:bg-slate-600 py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                <span>↩</span> Undo
            </button>
            <button id="confirm-btn" onclick="confirmSet()" class="bg-green-600 py-4 rounded-xl font-black text-lg shadow-lg">
                確認此局
            </button>
        </div>

        <div class="bg-slate-800/50 rounded-2xl p-4 flex-grow border border-slate-700 overflow-y-auto">
            <h3 class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em] mb-3 text-center">Set History 局分明細</h3>
            <div id="history" class="space-y-2"></div>
        </div>
        
        <button onclick="resetAll()" class="mt-4 text-slate-600 text-[10px] hover:text-red-400 transition-colors uppercase tracking-widest">Reset Entire Match</button>
    </div>

    <script>
        let scoreA = 0, scoreB = 0;
        let winsA = 0, winsB = 0;
        let sets = [];
        let log = [];

        // 初始化設定
        function startMatch() {
            const name1 = document.getElementById('setup-p1').value.trim() || "選手 A";
            const name2 = document.getElementById('setup-p2').value.trim() || "選手 B";
            document.getElementById('p1-display').value = name1;
            document.getElementById('p2-display').value = name2;
            document.getElementById('setup-modal').classList.add('hidden');
            updateUI();
        }

        function getRules() {
            const hi = Math.max(scoreA, scoreB);
            const lo = Math.min(scoreA, scoreB);
            return {
                isOver: (hi >= 11 && (hi - lo >= 2)) || (hi > 11 && (hi - lo === 2)),
                mustSwap: (winsA + winsB + 1 === 5 && hi >= 5)
            };
        }

        function updateUI() {
            const p1 = document.getElementById('p1-display').value;
            const p2 = document.getElementById('p2-display').value;
            const currentSet = winsA + winsB + 1;
            const rules = getRules();

            let isSwapped = (currentSet % 2 === 0);
            if (currentSet === 5 && (scoreA >= 5 || scoreB >= 5)) isSwapped = !isSwapped;

            document.getElementById('wins-a').innerText = winsA;
            document.getElementById('wins-b').innerText = winsB;

            const labelL = document.getElementById('label-left');
            const scoreL = document.getElementById('score-left');
            const labelR = document.getElementById('label-right');
            const scoreR = document.getElementById('score-right');

            labelL.innerText = isSwapped ? p2 : p1;
            scoreL.innerText = isSwapped ? scoreB : scoreA;
            labelR.innerText = isSwapped ? p1 : p2;
            scoreR.innerText = isSwapped ? scoreA : scoreB;

            const statusBar = document.getElementById('status-bar');
            const confirmBtn = document.getElementById('confirm-btn');
            const btnL = document.getElementById('btn-left');
            const btnR = document.getElementById('btn-right');

            if (winsA === 3 || winsB === 3) {
                statusBar.innerText = "Match Over 比賽結束";
                statusBar.classList.add('text-green-400');
                btnL.disabled = btnR.disabled = true;
            } else if (rules.isOver) {
                statusBar.innerText = "Set Point - Confirm Now";
                confirmBtn.classList.add('animate-confirm');
                btnL.disabled = btnR.disabled = true;
            } else {
                statusBar.innerText = `Set ${currentSet} - In Progress` + (rules.mustSwap ? " (Swapped)" : "");
                confirmBtn.classList.remove('animate-confirm');
                btnL.disabled = btnR.disabled = false;
            }
        }

        function addPoint(side) {
            const currentSet = winsA + winsB + 1;
            let isSwapped = (currentSet % 2 === 0);
            if (currentSet === 5 && (scoreA >= 5 || scoreB >= 5)) isSwapped = !isSwapped;

            if (side === 'left') {
                isSwapped ? scoreB++ : scoreA++;
                log.push('left');
            } else {
                isSwapped ? scoreA++ : scoreB++;
                log.push('right');
            }
            updateUI();
        }

        function undo() {
            if (log.length === 0) return;
            const last = log.pop();
            const currentSet = winsA + winsB + 1;
            let isSwapped = (currentSet % 2 === 0);
            if (currentSet === 5 && (scoreA >= 5 || scoreB >= 5)) isSwapped = !isSwapped;

            if (last === 'left') {
                isSwapped ? scoreB-- : scoreA--;
            } else {
                isSwapped ? scoreA-- : scoreB--;
            }
            updateUI();
        }

        function confirmSet() {
            if (getRules().isOver) {
                sets.push({ a: scoreA, b: scoreB });
                scoreA > scoreB ? winsA++ : winsB++;
                scoreA = 0; scoreB = 0; log = [];
                
                document.getElementById('history').innerHTML = sets.map((s, i) => `
                    <div class="flex justify-between items-center bg-slate-700/50 px-4 py-2 rounded-xl border border-slate-600">
                        <span class="text-[10px] font-bold text-slate-400 font-mono">SET ${i+1}</span>
                        <span class="font-mono font-bold ${s.a > s.b ? 'text-blue-400' : 'text-red-400'}">${s.a}:${s.b}</span>
                    </div>
                `).join('');
                updateUI();
            }
        }

        function resetAll() {
            if (confirm("Reset everything?")) location.reload();
        }
    </script>
</body>
</html>
